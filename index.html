<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Together</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:Inter,-apple-system,sans-serif;min-height:100vh;font-size:16px}
.nav{background:#161b22;border-bottom:1px solid #21262d;display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;position:sticky;top:0;z-index:100;padding:0 12px}
.nav::-webkit-scrollbar{display:none}
.nav-brand{font-size:15px;font-weight:700;padding:13px 12px 13px 0;border-right:1px solid #21262d;margin-right:6px;white-space:nowrap;flex-shrink:0;color:#58a6ff}
.nav-tab{padding:13px 12px;font-size:13px;font-weight:600;color:#58a6ff;opacity:.5;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;flex-shrink:0}
.nav-tab.active{opacity:1;border-bottom-color:#58a6ff}
.page{display:none;padding:16px 14px;max-width:600px;margin:0 auto}
.page.active{display:block}
.card{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:14px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#58a6ff;border-bottom:1px solid #21262d;padding-bottom:8px;margin-bottom:12px}
.flabel{display:block;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#58a6ff;margin-bottom:5px}
input{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-family:inherit;font-size:15px;padding:9px 12px;outline:none}
input:focus{border-color:#58a6ff}
.btn-save{width:100%;padding:12px;background:#58a6ff;color:#000;border:none;border-radius:7px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.loc-group{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.loc-btn{padding:14px;border:2px solid #30363d;border-radius:8px;background:#0d1117;color:#7d8590;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.loc-btn.sel-larry{border-color:#58a6ff;background:rgba(88,166,255,.12);color:#58a6ff}
.loc-btn.sel-liz{border-color:#bc8cff;background:rgba(188,140,255,.12);color:#bc8cff}
.sex-btn{width:100%;padding:13px;border:2px solid #30363d;border-radius:8px;background:#0d1117;color:#7d8590;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;text-align:center;margin-bottom:12px;transition:all .15s}
.sex-btn.on{border-color:#79b8ff;background:rgba(121,184,255,.2);color:#79b8ff;font-weight:700}
.sex-btn.fight-on{border-color:#79b8ff;background:rgba(121,184,255,.2);color:#79b8ff;font-weight:700}
.mrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}
.metric{background:#1c2128;border:1px solid #21262d;border-radius:8px;padding:12px 14px}
.mlabel{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#58a6ff;margin-bottom:4px}
.mval{font-size:22px;font-weight:700;font-family:monospace;color:#58a6ff}
.msub{font-size:11px;color:#58a6ff;opacity:.6;margin-top:2px}
.entry{background:#1c2128;border:1px solid #21262d;border-radius:8px;padding:11px 13px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.chip-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border:1px solid #30363d;border-radius:20px;font-size:13px;font-weight:600;color:#58a6ff;opacity:.5;cursor:pointer;white-space:nowrap;background:transparent}
.chip.active{opacity:1;border-color:#58a6ff;background:rgba(88,166,255,.1)}
.sbar{height:10px;border-radius:5px;background:#21262d;overflow:hidden;display:flex;margin:4px 0}
.sbar-l{background:#58a6ff;transition:width .4s}
.sbar-liz{background:#bc8cff;transition:width .4s}
.sbar-sex{background:#f0883e;transition:width .4s}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#58a6ff;color:#000;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:200;overflow-y:auto}
.modal-inner{background:#161b22;border:1px solid #21262d;border-radius:10px;margin:20px 14px;padding:16px}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-ttl{font-size:16px;font-weight:700;color:#58a6ff}
.modal-x{font-size:22px;cursor:pointer;color:#58a6ff;opacity:.6}

.rating-btn{padding:8px 2px;border:1px solid #30363d;border-radius:5px;background:#0d1117;color:#7d8590;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.rating-btn.on{border-color:#58a6ff;background:rgba(88,166,255,.15);color:#58a6ff}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>
<div class="nav">
  <div class="nav-brand">&#128153; Together</div>
  <div class="nav-tab active" onclick="showPage('log',this)">&#128221; Log</div>
  <div class="nav-tab" onclick="showPage('summary',this)">&#128202; Summary</div>
  <div class="nav-tab" onclick="showPage('history',this)">&#128203; History</div>
  <div class="nav-tab" onclick="showPage('notes',this)">&#128221; Notes</div>
</div>
<div id="toast"></div>

<!-- LOG -->
<div class="page active" id="page-log">
  <div class="card">
    <div class="card-title">Log Night</div>
    <div style="margin-bottom:12px">
      <label class="flabel">Date</label>
      <input type="date" id="f-date">
    </div>
    <label class="flabel">Where did you sleep?</label>
    <div class="loc-group">
      <button class="loc-btn" id="btn-larry" onclick="selLoc('larry')">&#127968; Larry's</button>
      <button class="loc-btn" id="btn-liz" onclick="selLoc('liz')">&#127968; Liz's</button>
    </div>
    <button class="sex-btn" id="sex-btn" onclick="togSex()">&#10084;&#65039; Had Sex</button>
    <button class="sex-btn" id="fight-btn" onclick="togFight()" style="border-color:#30363d;color:#7d8590">&#128165; We Fought</button>
    <div style="margin-bottom:12px">
      <label class="flabel">Day Rating (1-10)</label>
      <div style="display:grid;grid-template-columns:repeat(10,1fr);gap:4px" id="rating-btns"></div>
    </div>
    <button class="btn-save" onclick="saveNight()">&#128190; Save Night</button>
  </div>
  <div class="card" id="quick-card"></div>
</div>

<!-- SUMMARY -->
<div class="page" id="page-summary">
  <div class="chip-row" id="period-chips"></div>
  <div id="summary-content"></div>
  <div class="card" id="chart-card" style="display:none">
    <div class="card-title">Monthly % Trends</div>
    <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap" id="chart-toggles">
      <button class="chip active" id="tog-larry"   onclick="togLine('larry')"  >Larry's %</button>
      <button class="chip active" id="tog-liz"     onclick="togLine('liz')"    >Liz's %</button>
      <button class="chip active" id="tog-sex"     onclick="togLine('sex')"    >Sex %</button>
      <button class="chip active" id="tog-fought"  onclick="togLine('fought')" >Fought %</button>
      <button class="chip active" id="tog-score"   onclick="togLine('score')"  >Avg Score</button>
    </div>
    <div style="position:relative;height:240px">
      <canvas id="trend-chart"></canvas>
    </div>
    <div style="display:flex;gap:10px;margin-top:10px;font-size:11px;flex-wrap:wrap">
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:3px;background:#58a6ff;display:inline-block;border-radius:2px"></span>Larry's %</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:3px;background:#bc8cff;display:inline-block;border-radius:2px"></span>Liz's %</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:3px;background:#f0883e;display:inline-block;border-radius:2px"></span>Sex %</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:3px;background:#58a6ff;display:inline-block;border-radius:2px"></span>Fought %</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:3px;background:#3fb950;display:inline-block;border-radius:2px"></span>Avg Score</span>
    </div>
  </div>
</div>

<!-- HISTORY -->
<div class="page" id="page-history">
  <div id="history-content"></div>
</div>

<!-- NOTES -->
<div class="page" id="page-notes">
  <div class="card">
    <div class="card-title">Add Note</div>
    <div style="margin-bottom:10px">
      <label class="flabel">Title</label>
      <input type="text" id="note-title" placeholder="e.g. Communication, Trust…">
    </div>
    <div style="margin-bottom:10px">
      <label class="flabel">Details</label>
      <textarea id="note-body" rows="5" style="width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-family:inherit;font-size:15px;padding:9px 12px;outline:none;resize:vertical"></textarea>
    </div>
    <button class="btn-save" onclick="saveNote()">&#128190; Save Note</button>
  </div>
  <div id="notes-list"></div>
</div>

<!-- EDIT NOTE MODAL -->
<div class="modal" id="edit-note-modal">
  <div class="modal-inner">
    <div class="modal-hdr">
      <div class="modal-ttl">Edit Note</div>
      <div class="modal-x" onclick="closeEditNote()">&#10005;</div>
    </div>
    <div style="margin-bottom:10px">
      <label class="flabel">Title</label>
      <input type="text" id="en-title">
    </div>
    <div style="margin-bottom:12px">
      <label class="flabel">Details</label>
      <textarea id="en-body" rows="5" style="width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-family:inherit;font-size:15px;padding:9px 12px;outline:none;resize:vertical"></textarea>
    </div>
    <button class="btn-save" onclick="saveEditNote()">&#128190; Save Changes</button>
    <button class="btn-del" onclick="delNote()">&#128465; Delete</button>
  </div>
</div>
<div class="modal" id="edit-modal">
  <div class="modal-inner">
    <div class="modal-hdr">
      <div class="modal-ttl">Edit Entry</div>
      <div class="modal-x" onclick="closeEdit()">&#10005;</div>
    </div>
    <div style="margin-bottom:12px">
      <label class="flabel">Date</label>
      <input type="date" id="e-date">
    </div>
    <label class="flabel">Where?</label>
    <div class="loc-group">
      <button class="loc-btn" id="e-btn-larry" onclick="eSelLoc('larry')">&#127968; Larry's</button>
      <button class="loc-btn" id="e-btn-liz" onclick="eSelLoc('liz')">&#127968; Liz's</button>
    </div>
    <button class="sex-btn" id="e-sex-btn" onclick="eTogSex()">&#10084;&#65039; Had Sex</button>
    <button class="sex-btn" id="e-fight-btn" onclick="eTogFight()" style="border-color:#30363d;color:#7d8590">&#128165; We Fought</button>
    <div style="margin-bottom:12px">
      <label class="flabel">Day Rating (1-10)</label>
      <div style="display:grid;grid-template-columns:repeat(10,1fr);gap:4px" id="e-rating-btns"></div>
    </div>
    <button class="btn-save" onclick="saveEdit()">&#128190; Save Changes</button>
    <button class="btn-del" onclick="delEntry()">&#128465; Delete</button>
  </div>
</div>

<script>
var entries = [];
try { entries = JSON.parse(localStorage.getItem('together_v1') || '[]'); } catch(e) {}

var loc = null;
var sex = false;
var fought = false;
var rating = 0;
var eLoc = null;
var eSex = false;
var eFought = false;
var eRating = 0;
var editId = null;
var period = 'month';

var LARRY = '#58a6ff';
var LIZ   = '#bc8cff';
var SEX   = '#f0883e';

function save() { localStorage.setItem('together_v1', JSON.stringify(entries)); }
function today() { return new Date().toISOString().split('T')[0]; }
function toast(m) {
  var t = document.getElementById('toast');
  t.textContent = m; t.style.opacity = '1';
  setTimeout(function(){ t.style.opacity = '0'; }, 2500);
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('f-date').value = today();
  buildRatingBtns('rating-btns', 0);
  renderAll();
});

function selLoc(l) {
  loc = l;
  document.getElementById('btn-larry').className = 'loc-btn' + (l === 'larry' ? ' sel-larry' : '');
  document.getElementById('btn-liz').className   = 'loc-btn' + (l === 'liz'   ? ' sel-liz'   : '');
}

function eSelLoc(l) {
  eLoc = l;
  document.getElementById('e-btn-larry').className = 'loc-btn' + (l === 'larry' ? ' sel-larry' : '');
  document.getElementById('e-btn-liz').className   = 'loc-btn' + (l === 'liz'   ? ' sel-liz'   : '');
}

function togFight() {
  fought = !fought;
  var b = document.getElementById('fight-btn');
  b.className = fought ? 'sex-btn fight-on' : 'sex-btn';
  b.style.borderColor = '';
  b.style.color = '';
  b.innerHTML = fought ? '&#128165; We Fought &#10003;' : '&#128165; We Fought';
}

function eTogFight() {
  eFought = !eFought;
  var b = document.getElementById('e-fight-btn');
  b.className = eFought ? 'sex-btn fight-on' : 'sex-btn';
  b.style.borderColor = '';
  b.style.color = '';
  b.innerHTML = eFought ? '&#128165; We Fought &#10003;' : '&#128165; We Fought';
}

function selRating(n, prefix) {
  if (prefix === 'e') { eRating = n; } else { rating = n; }
  var id = prefix ? prefix + '-rating-btns' : 'rating-btns';
  var btns = document.getElementById(id).querySelectorAll('.rating-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].className = (i < n) ? 'rating-btn on' : 'rating-btn';
  }
}

function buildRatingBtns(containerId, selected) {
  var html = '';
  for (var i = 1; i <= 10; i++) {
    html += '<button class="rating-btn' + (i <= selected ? ' on' : '') + '" onclick="selRating(' + i + ',\'' + (containerId.startsWith('e') ? 'e' : '') + '\')">' + i + '</button>';
  }
  document.getElementById(containerId).innerHTML = html;
}

function togSex() {
  sex = !sex;
  var b = document.getElementById('sex-btn');
  b.className = sex ? 'sex-btn on' : 'sex-btn';
  b.innerHTML = sex ? '&#10084;&#65039; Had Sex &#10003;' : '&#10084;&#65039; Had Sex';
}

function eTogSex() {
  eSex = !eSex;
  var b = document.getElementById('e-sex-btn');
  b.className = eSex ? 'sex-btn on' : 'sex-btn';
  b.innerHTML = eSex ? '&#10084;&#65039; Had Sex &#10003;' : '&#10084;&#65039; Had Sex';
}

function saveNight() {
  var d = document.getElementById('f-date').value;
  if (!d) { toast('Select a date'); return; }
  if (!loc) { toast('Select where you slept'); return; }
  var dup = entries.filter(function(e){ return e.date === d; });
  if (dup.length > 0) {
    if (!confirm('Entry for this date exists. Replace it?')) return;
    entries = entries.filter(function(e){ return e.date !== d; });
  }
  entries.push({ id: Date.now(), date: d, loc: loc, sex: sex, fought: fought, rating: rating });
  entries.sort(function(a,b){ return b.date.localeCompare(a.date); });
  save(); toast('Night logged');
  loc = null; sex = false; fought = false; rating = 0;
  document.getElementById('f-date').value = today();
  document.getElementById('btn-larry').className = 'loc-btn';
  document.getElementById('btn-liz').className   = 'loc-btn';
  document.getElementById('sex-btn').className   = 'sex-btn';
  document.getElementById('sex-btn').innerHTML   = '&#10084;&#65039; Had Sex';
  document.getElementById('fight-btn').className = 'sex-btn';
  document.getElementById('fight-btn').style.color = '#7d8590';
  document.getElementById('fight-btn').innerHTML = '&#128165; We Fought';
  buildRatingBtns('rating-btns', 0);
  renderAll();
}

function openEdit(id) {
  var e = null;
  for (var i = 0; i < entries.length; i++) { if (entries[i].id === id) { e = entries[i]; break; } }
  if (!e) return;
  editId = id; eLoc = e.loc; eSex = e.sex || false; eFought = e.fought || false; eRating = e.rating || 0;
  document.getElementById('e-date').value = e.date || '';
  document.getElementById('e-btn-larry').className = 'loc-btn' + (e.loc === 'larry' ? ' sel-larry' : '');
  document.getElementById('e-btn-liz').className   = 'loc-btn' + (e.loc === 'liz'   ? ' sel-liz'   : '');
  var sb = document.getElementById('e-sex-btn');
  sb.className = eSex ? 'sex-btn on' : 'sex-btn';
  sb.innerHTML = eSex ? '&#10084;&#65039; Had Sex &#10003;' : '&#10084;&#65039; Had Sex';
  var fb = document.getElementById('e-fight-btn');
  fb.className = eFought ? 'sex-btn fight-on' : 'sex-btn';
  fb.style.borderColor = '';
  fb.style.color = '';
  fb.innerHTML = eFought ? '&#128165; We Fought &#10003;' : '&#128165; We Fought';
  buildRatingBtns('e-rating-btns', eRating);
  document.getElementById('edit-modal').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closeEdit() {
  document.getElementById('edit-modal').style.display = 'none';
  document.body.style.overflow = ''; editId = null;
}

function saveEdit() {
  if (!editId) return;
  for (var i = 0; i < entries.length; i++) {
    if (entries[i].id === editId) {
      entries[i].date = document.getElementById('e-date').value;
      entries[i].loc    = eLoc;
      entries[i].sex    = eSex;
      entries[i].fought = eFought;
      entries[i].rating = eRating;
      break;
    }
  }
  entries.sort(function(a,b){ return b.date.localeCompare(a.date); });
  save(); toast('Updated'); closeEdit(); renderAll();
}

function delEntry() {
  if (!editId) return;
  if (!confirm('Delete this entry?')) return;
  entries = entries.filter(function(e){ return e.id !== editId; });
  save(); toast('Deleted'); closeEdit(); renderAll();
}

function stats(data) {
  var n = data.length;
  var atL = 0, atLiz = 0, sexN = 0, foughtN = 0, ratingSum = 0, ratingCount = 0;
  for (var i = 0; i < data.length; i++) {
    if (data[i].loc === 'larry') atL++;
    if (data[i].loc === 'liz')   atLiz++;
    if (data[i].sex)    sexN++;
    if (data[i].fought) foughtN++;
    if (data[i].rating) { ratingSum += data[i].rating; ratingCount++; }
  }
  var tog = atL + atLiz;
  return {
    n: n, atL: atL, atLiz: atLiz, tog: tog, sexN: sexN, foughtN: foughtN,
    avgRating: ratingCount ? Math.round(ratingSum / ratingCount * 10) / 10 : null,
    pL:      tog ? Math.round(atL     / tog  * 100) : 0,
    pLiz:    tog ? Math.round(atLiz   / tog  * 100) : 0,
    pSex:    tog ? Math.round(sexN    / tog  * 100) : 0,
    pFought: tog ? Math.round(foughtN / tog  * 100) : 0
  };
}

function statBlock(label, s) {
  var RED = '#58a6ff';
  return '<div style="margin-bottom:8px;font-size:13px;font-weight:700;color:#e6edf3">' + label + ' <span style="font-size:12px;color:#58a6ff;font-weight:400;opacity:.6">(' + s.tog + ' night' + (s.tog !== 1 ? 's' : '') + ' together)</span></div>' +
    '<div style="font-size:11px;color:#58a6ff;opacity:.7;margin-bottom:3px">Where slept</div>' +
    '<div class="sbar">' +
      '<div class="sbar-l"   style="width:' + s.pL   + '%"></div>' +
      '<div class="sbar-liz" style="width:' + s.pLiz + '%"></div>' +
    '</div>' +
    '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:10px">' +
    '<span style="color:' + LARRY + '">Larry\'s: ' + s.atL + ' (' + s.pL + '%)</span>' +
    '<span style="color:' + LIZ + '">Liz\'s: ' + s.atLiz + ' (' + s.pLiz + '%)</span></div>' +
    '<div class="mrow" style="margin-bottom:0">' +
      '<div class="metric"><div class="mlabel">Sex Nights</div><div class="mval" style="color:' + SEX + '">' + s.sexN + '</div><div class="msub">' + s.pSex + '% of together</div></div>' +
      '<div class="metric"><div class="mlabel">Fights</div><div class="mval" style="color:' + RED + '">' + s.foughtN + '</div><div class="msub">' + s.pFought + '% of together</div></div>' +
      '<div class="metric"><div class="mlabel">Avg Day</div><div class="mval" style="color:#58a6ff">' + (s.avgRating !== null ? s.avgRating : '—') + '</div><div class="msub">out of 10</div></div>' +
    '</div>';
}

function renderQuick() {
  var el = document.getElementById('quick-card');
  if (!entries.length) { el.innerHTML = '<div style="color:#58a6ff;opacity:.5;font-size:13px">Log your first night to see stats.</div>'; return; }
  var s = stats(entries);
  el.innerHTML = '<div class="card-title">All Time</div>' +
    '<div class="mrow">' +
    '<div class="metric"><div class="mlabel">Larry\'s</div><div class="mval" style="color:' + LARRY + '">' + s.atL + '</div><div class="msub">' + s.pL + '% of together</div></div>' +
    '<div class="metric"><div class="mlabel">Liz\'s</div><div class="mval" style="color:' + LIZ + '">' + s.atLiz + '</div><div class="msub">' + s.pLiz + '% of together</div></div>' +
    '<div class="metric"><div class="mlabel">Sex Nights</div><div class="mval" style="color:' + SEX + '">' + s.sexN + '</div><div class="msub">' + s.pSex + '% of together</div></div>' +
    '<div class="metric"><div class="mlabel">Fights</div><div class="mval" style="color:#58a6ff">' + s.foughtN + '</div><div class="msub">' + s.pFought + '% of together</div></div>' +
    '<div class="metric"><div class="mlabel">Avg Day</div><div class="mval" style="color:#58a6ff">' + (s.avgRating !== null ? s.avgRating : '—') + '</div><div class="msub">out of 10</div></div>' +
    '</div>';
}

function renderSummary() {
  var periods = ['week','month','year','all'];
  var labels  = {week:'This Week',month:'This Month',year:'This Year',all:'All Time'};
  var chips = '';
  for (var i = 0; i < periods.length; i++) {
    var p = periods[i];
    chips += '<div class="chip' + (period===p?' active':'') + '" onclick="period=\'' + p + '\';renderSummary()">' + labels[p] + '</div>';
  }
  document.getElementById('period-chips').innerHTML = chips;

  var now = new Date();
  var todayStr = today();
  var filtered = entries.slice();

  if (period === 'week') {
    var start = new Date(now); start.setDate(now.getDate() - now.getDay());
    var s0 = start.toISOString().split('T')[0];
    filtered = entries.filter(function(e){ return e.date >= s0 && e.date <= todayStr; });
  } else if (period === 'month') {
    var s0 = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-01';
    filtered = entries.filter(function(e){ return e.date >= s0 && e.date <= todayStr; });
  } else if (period === 'year') {
    var s0 = now.getFullYear() + '-01-01';
    filtered = entries.filter(function(e){ return e.date >= s0 && e.date <= todayStr; });
  }

  var el = document.getElementById('summary-content');
  if (!filtered.length) { el.innerHTML = '<div style="text-align:center;padding:40px;color:#58a6ff;opacity:.5">No entries for this period.</div>'; return; }

  var s = stats(filtered);
  var html = '<div class="card">' + statBlock(labels[period], s) + '</div>';

  // Monthly breakdown for year/all
  if (period === 'all' || period === 'year') {
    var months = [];
    var seen = {};
    for (var i = 0; i < entries.length; i++) {
      var m = entries[i].date.slice(0,7);
      if (!seen[m]) { seen[m] = true; months.push(m); }
    }
    months.sort().reverse();
    if (months.length) {
      html += '<div class="card"><div class="card-title">By Month</div>';
      for (var i = 0; i < months.length; i++) {
        var m = months[i];
        var mData = entries.filter(function(e){ return e.date.slice(0,7) === m; });
        var ms = stats(mData);
        var mLabel = new Date(m + '-15').toLocaleDateString('en-US',{month:'long',year:'numeric'});
        html += '<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #21262d">' +
          '<div style="display:flex;justify-content:space-between;margin-bottom:6px">' +
          '<span style="font-size:14px;font-weight:700">' + mLabel + '</span>' +
          '<span style="font-size:12px;color:#58a6ff;opacity:.6">' + ms.tog + ' together &middot; ' + ms.sexN + ' sex</span></div>' +
          '<div class="sbar"><div class="sbar-l" style="width:' + ms.pL + '%"></div><div class="sbar-liz" style="width:' + ms.pLiz + '%"></div><div class="sbar-sex" style="width:' + ms.pSex + '%;opacity:.85"></div></div>' +
          '<div style="display:flex;justify-content:space-between;font-size:12px">' +
          '<span style="color:' + LARRY + '">' + ms.atL + ' at Larry\'s (' + ms.pL + '%)</span>' +
          '<span style="color:' + LIZ + '">' + ms.atLiz + ' at Liz\'s (' + ms.pLiz + '%)</span></div></div>';
      }
      html += '</div>';
    }
  }

  el.innerHTML = html;
}

function renderHistory() {
  var el = document.getElementById('history-content');
  if (!entries.length) { el.innerHTML = '<div style="text-align:center;padding:40px;color:#58a6ff;opacity:.5">No entries yet.</div>'; return; }
  var html = '';
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    var locLabel = e.loc === 'larry' ? 'Larry\'s' : 'Liz\'s';
    var locColor = e.loc === 'larry' ? LARRY : LIZ;
    var icon = '&#127968;';
    var d = new Date(e.date + 'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
    html += '<div class="entry">' +
      '<div><div style="font-size:14px;font-weight:700">' + d + '</div>' +
      '<div style="font-size:13px;margin-top:2px;color:' + locColor + '">' + icon + ' ' + locLabel +
      (e.sex    ? ' &nbsp;&#10084;&#65039; Sex'     : '') +
      (e.fought ? ' &nbsp;&#128165; Fought'          : '') +
      (e.rating ? ' &nbsp;&#11088; ' + e.rating + '/10' : '') +
      '</div></div>' +
      '<button onclick="openEdit(' + e.id + ')" style="padding:5px 12px;background:#1c2128;border:1px solid #30363d;color:#58a6ff;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap">&#9999;&#65039; Edit</button>' +
      '</div>';
  }
  el.innerHTML = html;
}

function showPage(id, tab) {
  var pages = document.querySelectorAll('.page');
  var tabs  = document.querySelectorAll('.nav-tab');
  for (var i = 0; i < pages.length; i++) pages[i].classList.remove('active');
  for (var i = 0; i < tabs.length;  i++) tabs[i].classList.remove('active');
  document.getElementById('page-' + id).classList.add('active');
  if (tab) tab.classList.add('active');
  renderAll();
}

var trendChart = null;
var lineVis = {larry:true, liz:true, sex:true, fought:true, score:true};

function togLine(key) {
  lineVis[key] = !lineVis[key];
  var btn = document.getElementById('tog-' + key);
  btn.className = lineVis[key] ? 'chip active' : 'chip';
  renderChart();
}

function renderChart() {
  var months = [];
  var seen = {};
  for (var i = 0; i < entries.length; i++) {
    var m = entries[i].date.slice(0,7);
    if (!seen[m]) { seen[m] = true; months.push(m); }
  }
  months.sort();

  if (months.length < 2) {
    document.getElementById('chart-card').style.display = 'none';
    return;
  }
  document.getElementById('chart-card').style.display = 'block';

  var labels = [], pL = [], pLiz = [], pSex = [], pFought = [], avgScore = [];
  for (var i = 0; i < months.length; i++) {
    var m = months[i];
    var mData = entries.filter(function(e){ return e.date.slice(0,7) === m; });
    var ms = stats(mData);
    labels.push(new Date(m + '-15').toLocaleDateString('en-US',{month:'short',year:'2-digit'}));
    pL.push(ms.pL);
    pLiz.push(ms.pLiz);
    pSex.push(ms.pSex);
    pFought.push(ms.pFought);
    avgScore.push(ms.avgRating !== null ? ms.avgRating * 10 : null); // scale to 0-100
  }

  var ctx = document.getElementById('trend-chart');
  if (trendChart) { trendChart.destroy(); trendChart = null; }
  trendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {label:"Larry's %", data:pL,      hidden:!lineVis.larry,  borderColor:'#58a6ff', borderWidth:2.5, pointRadius:4, pointBackgroundColor:'#58a6ff', tension:0.3, fill:false},
        {label:"Liz's %",   data:pLiz,    hidden:!lineVis.liz,    borderColor:'#bc8cff', borderWidth:2.5, pointRadius:4, pointBackgroundColor:'#bc8cff', tension:0.3, fill:false},
        {label:"Sex %",     data:pSex,    hidden:!lineVis.sex,    borderColor:'#f0883e', borderWidth:2.5, pointRadius:4, pointBackgroundColor:'#f0883e', tension:0.3, fill:false},
        {label:"Fought %",  data:pFought, hidden:!lineVis.fought, borderColor:'#58a6ff', borderWidth:2.5, pointRadius:4, pointBackgroundColor:'#58a6ff', tension:0.3, fill:false},
        {label:"Avg Score", data:avgScore,hidden:!lineVis.score,  borderColor:'#3fb950', borderWidth:2.5, pointRadius:4, pointBackgroundColor:'#3fb950', tension:0.3, fill:false,
         spanGaps:true}
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: function(c) {
          if (c.dataset.label === 'Avg Score') return 'Avg Score: ' + (c.raw / 10).toFixed(1) + '/10';
          return c.dataset.label + ': ' + c.raw + '%';
        }}}
      },
      scales: {
        x: { ticks: { color:'#58a6ff', font:{size:11} }, grid: { color:'rgba(88,166,255,.08)' } },
        y: { min:0, max:100, ticks: { color:'#58a6ff', font:{size:11}, callback: function(v){ return v+'%'; } }, grid: { color:'rgba(88,166,255,.08)' } }
      }
    }
  });
}

var notes = [];
try { notes = JSON.parse(localStorage.getItem('together_notes') || '[]'); } catch(e) {}
var editNoteId = null;

function saveNotes() { localStorage.setItem('together_notes', JSON.stringify(notes)); }

function saveNote() {
  var title = document.getElementById('note-title').value.trim();
  var body  = document.getElementById('note-body').value.trim();
  if (!title && !body) { toast('Enter a title or details'); return; }
  notes.unshift({ id: Date.now(), title: title, body: body, date: today() });
  saveNotes(); toast('Note saved');
  document.getElementById('note-title').value = '';
  document.getElementById('note-body').value  = '';
  renderNotes();
}

function openEditNote(id) {
  var n = null;
  for (var i = 0; i < notes.length; i++) { if (notes[i].id === id) { n = notes[i]; break; } }
  if (!n) return;
  editNoteId = id;
  document.getElementById('en-title').value = n.title || '';
  document.getElementById('en-body').value  = n.body  || '';
  document.getElementById('edit-note-modal').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closeEditNote() {
  document.getElementById('edit-note-modal').style.display = 'none';
  document.body.style.overflow = ''; editNoteId = null;
}

function saveEditNote() {
  if (!editNoteId) return;
  for (var i = 0; i < notes.length; i++) {
    if (notes[i].id === editNoteId) {
      notes[i].title = document.getElementById('en-title').value.trim();
      notes[i].body  = document.getElementById('en-body').value.trim();
      break;
    }
  }
  saveNotes(); toast('Updated'); closeEditNote(); renderNotes();
}

function delNote() {
  if (!editNoteId) return;
  if (!confirm('Delete this note?')) return;
  notes = notes.filter(function(n){ return n.id !== editNoteId; });
  saveNotes(); toast('Deleted'); closeEditNote(); renderNotes();
}

function renderNotes() {
  var el = document.getElementById('notes-list');
  if (!notes.length) { el.innerHTML = '<div style="text-align:center;padding:30px;color:#58a6ff;opacity:.5">No notes yet. Add areas of concern above.</div>'; return; }
  var html = '';
  for (var i = 0; i < notes.length; i++) {
    var n = notes[i];
    html += '<div class="card" style="margin-bottom:10px">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">' +
      '<div style="font-size:15px;font-weight:700;color:#58a6ff">' + (n.title || 'Untitled') + '</div>' +
      '<div style="display:flex;align-items:center;gap:8px">' +
      '<div style="font-size:11px;color:#58a6ff;opacity:.5">' + n.date + '</div>' +
      '<button onclick="openEditNote(' + n.id + ')" style="padding:4px 10px;background:#1c2128;border:1px solid #30363d;color:#58a6ff;border-radius:5px;font-size:12px;cursor:pointer;font-family:inherit">&#9999;&#65039; Edit</button>' +
      '</div></div>' +
      (n.body ? '<div style="font-size:14px;color:#e6edf3;line-height:1.6;white-space:pre-wrap">' + n.body + '</div>' : '') +
      '</div>';
  }
  el.innerHTML = html;
}

function renderAll() { renderQuick(); renderSummary(); renderChart(); renderHistory(); renderNotes(); }
</script>
